<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Distill Yourself Demo Video</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #080a0f;
      color: #f6f8fb;
      --panel: rgb(15 23 42 / 72%);
      --line: rgb(148 163 184 / 20%);
      --muted: #aab8cc;
      --accent: #38bdf8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(rgb(255 255 255 / 3%) 1px, transparent 1px),
        linear-gradient(90deg, rgb(255 255 255 / 3%) 1px, transparent 1px),
        radial-gradient(circle at 18% 12%, rgb(38 99 235 / 28%), transparent 30rem),
        radial-gradient(circle at 88% 10%, rgb(20 184 166 / 20%), transparent 28rem),
        linear-gradient(145deg, #080a0f 0%, #111827 46%, #0b1120 100%);
      background-size: 40px 40px, 40px 40px, auto, auto, auto;
    }

    body::before {
      position: fixed;
      inset: 0;
      pointer-events: none;
      content: "";
      background: linear-gradient(180deg, rgb(8 10 15 / 12%), #080a0f 92%);
    }

    main {
      position: relative;
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 34px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0;
      color: #dbeafe;
    }

    .brand-mark {
      display: inline-grid;
      width: 30px;
      height: 30px;
      place-items: center;
      border: 1px solid rgb(96 165 250 / 34%);
      border-radius: 8px;
      background: linear-gradient(135deg, rgb(37 99 235 / 40%), rgb(20 184 166 / 22%));
      box-shadow: inset 0 1px 0 rgb(255 255 255 / 18%);
    }

    .brand-mark::before {
      width: 12px;
      height: 12px;
      border: 2px solid #bfdbfe;
      border-radius: 4px;
      content: "";
    }

    .back-link {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 9px 14px;
      color: #cbd5e1;
      background: var(--panel);
      box-shadow: inset 0 1px 0 rgb(255 255 255 / 8%);
      font-size: 14px;
      text-decoration: none;
    }

    .back-link:hover {
      border-color: rgb(203 213 225 / 48%);
      color: #fff;
    }

    .intro {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      margin-bottom: 24px;
    }

    .eyebrow {
      display: inline-flex;
      margin-bottom: 12px;
      border: 1px solid rgb(96 165 250 / 30%);
      border-radius: 999px;
      padding: 6px 10px;
      color: #93c5fd;
      background: rgb(30 64 175 / 18%);
      font-size: 13px;
      font-weight: 650;
    }

    .copy {
      max-width: 780px;
    }

    .meta {
      min-width: 210px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      background: var(--panel);
      box-shadow: inset 0 1px 0 rgb(255 255 255 / 8%);
    }

    .meta-label {
      margin-bottom: 4px;
      color: #7dd3fc;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .meta-value {
      color: #f8fafc;
      font-size: 20px;
      font-weight: 750;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      max-width: 720px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
    }

    .stage {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 0;
      background: linear-gradient(180deg, rgb(255 255 255 / 12%), rgb(255 255 255 / 4%));
      box-shadow: 0 28px 80px rgb(0 0 0 / 38%);
    }

    .stage-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
      background: rgb(2 6 23 / 48%);
    }

    .window-controls {
      display: flex;
      gap: 7px;
    }

    .window-controls span {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #64748b;
    }

    .window-controls span:nth-child(1) {
      background: #fb7185;
    }

    .window-controls span:nth-child(2) {
      background: #fbbf24;
    }

    .window-controls span:nth-child(3) {
      background: #34d399;
    }

    .stage-title {
      overflow: hidden;
      color: #cbd5e1;
      font-size: 13px;
      font-weight: 650;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stage-status {
      color: #93c5fd;
      font-size: 12px;
      font-weight: 700;
    }

    video {
      display: block;
      width: 100%;
      max-height: 72vh;
      background: #000;
    }

    nav {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    a {
      color: #93c5fd;
      text-decoration: none;
    }

    nav a {
      min-height: 76px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      color: #cbd5e1;
      background: var(--panel);
      box-shadow: inset 0 1px 0 rgb(255 255 255 / 7%);
      font-size: 14px;
      font-weight: 600;
    }

    nav a:hover {
      border-color: rgb(125 211 252 / 42%);
      color: #f8fafc;
    }

    nav a[aria-current="true"] {
      border-color: rgb(96 165 250 / 75%);
      color: #fff;
      background:
        linear-gradient(135deg, rgb(37 99 235 / 88%), rgb(8 145 178 / 82%)),
        var(--panel);
      box-shadow: 0 12px 24px rgb(37 99 235 / 26%);
    }

    .nav-title,
    .nav-meta {
      display: block;
    }

    .nav-title {
      margin-bottom: 8px;
      color: inherit;
    }

    .nav-meta {
      color: rgb(203 213 225 / 72%);
      font-size: 12px;
      font-weight: 650;
    }

    nav a[aria-current="true"] .nav-meta {
      color: rgb(255 255 255 / 78%);
    }

    @media (max-width: 640px) {
      main {
        padding: 20px 14px 36px;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
        margin-bottom: 26px;
      }

      .intro {
        grid-template-columns: 1fr;
      }

      .meta {
        min-width: 0;
      }

      .stage {
        border-radius: 14px;
      }

      .stage-title {
        display: none;
      }

      nav {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <a class="brand" href="https://github.com/QuantaAlpha/Distill_Yourself"><span class="brand-mark" aria-hidden="true"></span> Distill Yourself</a>
      <a class="back-link" href="https://github.com/QuantaAlpha/Distill_Yourself">Back to docs</a>
    </header>
    <section class="intro" aria-labelledby="title">
      <div class="copy">
        <span class="eyebrow">Demo Library</span>
        <h1 id="title">Distill Yourself Demo Video</h1>
        <p id="description">Watch the demo in your browser.</p>
      </div>
      <aside class="meta" aria-label="Current video details">
        <div class="meta-label">Now playing</div>
        <div class="meta-value" id="duration">7:33</div>
      </aside>
    </section>
    <section class="stage" aria-label="Video player">
      <div class="stage-bar" aria-hidden="true">
        <div class="window-controls">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="stage-title" id="stage-title">Distill Yourself Demo Video</div>
        <div class="stage-status">HD</div>
      </div>
      <video id="player" controls preload="none" playsinline></video>
    </section>
    <nav id="playlist" aria-label="Demo videos"></nav>
  </main>

  <script>
    const videos = {
      "full-demo": {
        title: "Full Demo",
        description: "Complete Distill Yourself walkthrough (7:33).",
        duration: "7:33",
        poster: "../images/readme/demo-preview.jpg",
        src: "full-demo.mp4"
      },
      "cognitive-model": {
        title: "Cognitive Model",
        description: "Cognitive model demo clip (1:55).",
        duration: "1:55",
        poster: "../images/readme/twin-cognitive-model.png",
        src: "chapters/cognitive-model.mp4"
      },
      "evolve": {
        title: "Evolve Engine",
        description: "Evolve demo clip (1:55).",
        duration: "1:55",
        poster: "../images/readme/evolve-rules.png",
        src: "chapters/evolve.mp4"
      },
      "browse-search": {
        title: "Browse & Search",
        description: "Browse and search demo clip (0:55).",
        duration: "0:55",
        poster: "../images/user-guide/02-session.jpg",
        src: "chapters/browse-search.mp4"
      },
      "insights": {
        title: "Insights",
        description: "Insights demo clip (0:50).",
        duration: "0:50",
        poster: "../images/readme/insights-heatmap.png",
        src: "chapters/insights.mp4"
      }
    };

    const params = new URLSearchParams(window.location.search);
    const selected = videos[params.get("v")] ? params.get("v") : "full-demo";
    const video = videos[selected];

    document.title = `${video.title} - Distill Yourself`;
    document.getElementById("title").textContent = video.title;
    document.getElementById("description").textContent = video.description;
    document.getElementById("duration").textContent = video.duration;
    document.getElementById("stage-title").textContent = video.title;
    const player = document.getElementById("player");
    player.poster = video.poster;
    player.src = video.src;

    const playlist = document.getElementById("playlist");
    for (const [key, item] of Object.entries(videos)) {
      const link = document.createElement("a");
      link.href = `?v=${key}`;
      link.innerHTML = `<span class="nav-title">${item.title}</span><span class="nav-meta">${item.duration}</span>`;
      if (key === selected) {
        link.setAttribute("aria-current", "true");
      }
      playlist.appendChild(link);
    }
  </script>
</body>
</html>
